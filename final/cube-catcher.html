<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cube Catcher</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#0f172a;
        font-family:Arial, sans-serif;
    }

    /* SCORE DISPLAY */
    #scoreBoard{
        position:fixed;
        top:15px;
        left:15px;
        color:white;
        font-size:28px;
        font-weight:bold;
        background:rgba(0,0,0,0.4);
        padding:10px 20px;
        border-radius:12px;
        z-index:1000;
    }

    #gameArea{
        width:100vw;
        height:100vh;
        position:relative;
    }

    /* CUBE STYLE */
    .cube{
        width:55px;
        height:55px;
        position:absolute;
        top:-60px;
        border-radius:10px;
        cursor:pointer;
        user-select:none;
        transition:transform 0.1s;
    }

    .cube:hover{
        transform:scale(1.1);
    }

    /* BLUE CUBE */
    .blue{
        background:#00bfff;
        box-shadow:0 0 15px #00bfff;
    }

    /* RED CUBE */
    .red{
        background:#ff3b3b;
        box-shadow:0 0 15px #ff3b3b;
    }
</style>
</head>

<body>

<div id="scoreBoard">
    Score: <span id="score">0</span>
</div>

<div id="gameArea"></div>

<script>
    const gameArea = document.getElementById("gameArea");
    const scoreText = document.getElementById("score");

    let score = 0;

    // CREATE CUBE
    function spawnCube(){

        const cube = document.createElement("div");

        // More blue cubes than red
        const isBlue = Math.random() < 0.75;

        cube.classList.add("cube");
        cube.classList.add(isBlue ? "blue" : "red");

        // RANDOM X POSITION
        const x = Math.random() * (window.innerWidth - 60);
        cube.style.left = x + "px";

        gameArea.appendChild(cube);

        let y = -60;

        // RANDOM FALL SPEED
        const speed = 2 + Math.random() * 3;

        // CLICK EVENT
        cube.addEventListener("click", () => {

            // ONLY BLUE CUBES GIVE SCORE
            if(isBlue){
                score++;
                scoreText.textContent = score;
            }

            // REMOVE CUBE AFTER SINGLE CLICK
            cube.remove();
        });

        // SMOOTH FALL ANIMATION
        function fall(){

            y += speed;
            cube.style.top = y + "px";

            // REMOVE WHEN OFF SCREEN
            if(y < window.innerHeight){
                requestAnimationFrame(fall);
            } else {
                cube.remove();
            }
        }

        requestAnimationFrame(fall);
    }

    // FAST & EFFICIENT SPAWNING
    setInterval(spawnCube, 500);
</script>

</body>
</html>
